<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&P 500 Stock Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>S&P 500 Stock Tracker</h1>
    <p class="subtitle">Track all 500+ constituents of the S&P 500 index</p>
  </header>

  <main>
    <section class="controls">
      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          class="search-box"
          placeholder="Search by company name or ticker symbol..."
        >
      </div>
      <div class="filter-container">
        <select id="sectorFilter" class="filter-select">
          <option value="">All Sectors</option>
        </select>
      </div>
      <div class="results-info">
        <p id="resultsCount">Loading companies...</p>
      </div>
    </section>

    <section class="companies-grid" id="companiesGrid">
      <!-- Companies will be dynamically inserted here -->
    </section>
  </main>

  <footer>
    <p>Data provided by TradingView. For informational purposes only &mdash; not financial advice.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
